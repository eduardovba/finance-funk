<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Finance Funk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0B0611;
            color: #F5F0E8;
            font-family: 'Space Mono', 'SF Mono', 'Menlo', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 400px;
        }

        .logo {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            letter-spacing: 0.02em;
        }

        p {
            font-size: 0.9rem;
            color: rgba(245, 240, 232, 0.6);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6C3FC5, #9B59B6);
            color: #F5F0E8;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }

        .retry-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .wifi-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logos/FF Star.png" alt="Finance Funk" class="logo" />
        <div class="wifi-icon">📡</div>
        <h1>You're offline</h1>
        <p>Finance Funk needs an internet connection to load your portfolio data. Check your connection and try again.</p>
        <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
